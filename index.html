<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser</title>

    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <div class="container">

        <header class="header">
            <h1>Parser</h1>
        </header>

        <!-- Action Card -->
        <div class="card">
            <div class="button-group">
                <button id="loadSample1">Load Sample 1</button>
                <button id="loadSample2">Load Sample 2</button>
                <button id="clearData">Clear</button>
            </div>
        </div>

        <!-- Input Card -->
        <div class="card">
            <h2>Input</h2>
            <textarea
                id="inputText"
                placeholder="Masukkan teks di sini..."
                rows="12"
            ></textarea>
        </div>

        <!-- Parse Card -->
        <div class="card">
            <button id="parseButton" class="primary-button">
                Parse
            </button>
        </div>

        <!-- Result Card (readable, interactive tree) -->
        <div class="card">
            <h2>Result (interaktif)</h2>
            <div id="resultTree"></div>
        </div>

        <!-- Result Card (raw JSON, for copy/paste or debugging) -->
        <div class="card">
            <h2>Result (raw JSON)</h2>
            <textarea
                id="resultText"
                placeholder="Hasil parse akan muncul di sini..."
                rows="12"
            ></textarea>
            <div class="button-group">
                <button id="downloadJson">Download JSON</button>
            </div>
        </div>

    </div>

    <script src="js/parse_engine.js"></script>
    <script src="js/render_tree.js"></script>
    <script src="js/parse.js"></script>
</body>
</html>
